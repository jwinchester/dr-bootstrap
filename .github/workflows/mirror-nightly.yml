name: Nightly mirror to Codeberg + B2

# Mirrors this repo nightly so dr-bootstrap survives a GitHub-side outage
# (e.g. account suspension, network partition).
#
# Targets:
#   1. Codeberg (https://codeberg.org/jwinchester/dr-bootstrap)
#   2. B2 tarball: uluhe-secrets/dr-bootstrap-YYYY-MM-DD.tar.gz
#
# Secrets needed in repo settings:
#   CODEBERG_TOKEN    — Codeberg deploy token with push access
#   B2_ACCOUNT_ID     — B2 application key ID (uluhe-secrets bucket scope)
#   B2_ACCOUNT_KEY    — B2 application key

on:
  schedule:
    - cron: '17 4 * * *'   # 04:17 UTC nightly
  workflow_dispatch:        # manual trigger from Actions UI

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

